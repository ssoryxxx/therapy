<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терапия ПРЛ+СДВГ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.8rem;
            margin-bottom: 2rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #2c3e66, #4a6fa5); background-clip: text; -webkit-background-clip: text; color: transparent; }
        h2 { font-size: 1.4rem; font-weight: 500; margin-bottom: 1rem; color: #0f3b5c; border-left: 5px solid #4a6fa5; padding-left: 1rem; }
        button {
            background: #4a6fa5;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2c3e66; }
        .btn-outline {
            background: transparent;
            border: 1px solid #4a6fa5;
            color: #4a6fa5;
        }
        .form-grid { display: flex; flex-direction: column; gap: 1.2rem; }
        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; font-size: 0.9rem; color: #2d3e5f; }
        input, textarea {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        textarea { min-height: 70px; resize: vertical; }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; }
        .toggle-switch { display: flex; align-items: center; gap: 0.8rem; }
        .toggle-switch input {
            width: 40px; height: 20px; appearance: none; background: #cbd5e1; border-radius: 20px;
            position: relative; cursor: pointer;
        }
        .toggle-switch input:checked { background: #4a6fa5; }
        .toggle-switch input::before {
            content: ''; width: 16px; height: 16px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 2px; transition: 0.2s;
        }
        .toggle-switch input:checked::before { left: 22px; }
        .form-list { display: flex; flex-direction: column; gap: 1rem; }
        .form-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; }
        .submissions {
            background: #fefce8;
            border-left: 5px solid #eab308;
            margin-top: 0.8rem;
            padding: 0.8rem;
            border-radius: 16px;
            font-size: 0.85rem;
        }
        .login-screen { max-width: 450px; margin: 10vh auto; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #6c7a91; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }
        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // --- Функция для показа ошибок на экране ---
    function showError(msg) {
        const app = document.getElementById('app');
        const errDiv = document.createElement('div');
        errDiv.className = 'error-message';
        errDiv.innerHTML = `⚠️ <strong>Ошибка:</strong><br>${msg}`;
        app.prepend(errDiv);
        console.error(msg);
    }

    // --- Базовые данные Supabase ---
    const SUPABASE_URL = "https://jnfhgnikpgpyeudlrdpe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuZmhnbmlrcGdweWV1ZGxyZHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDY3NjEsImV4cCI6MjA5MDUyMjc2MX0.7FsplRzp0dgYagixZnAHvH_Hl2OFZFUi5qvlU04roIg";

    let supabaseClient = null;
    let currentRole = null; // 'therapist' или 'patient'
    let formsCache = [];

    // --- Инициализация клиента Supabase ---
    function initSupabase() {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return true;
        } catch(e) {
            showError("Не удалось создать клиент Supabase: " + e.message);
            return false;
        }
    }

    // --- Загрузка списка форм из Supabase ---
    async function loadForms() {
        if (!supabaseClient) return false;
        try {
            const { data, error } = await supabaseClient.from('forms').select('*');
            if (error) {
                showError(`Ошибка загрузки форм: ${error.message}`);
                return false;
            }
            if (!data || data.length === 0) {
                showError("Таблица 'forms' пуста. Выполните SQL-скрипт.");
                return false;
            }
            formsCache = data;
            return true;
        } catch(e) {
            showError(`Исключение при загрузке форм: ${e.message}`);
            return false;
        }
    }

    // --- Получить доступность форм ---
    async function getAvailability() {
        if (!supabaseClient) return {};
        const { data, error } = await supabaseClient.from('availability').select('*');
        if (error) {
            showError(`Ошибка получения доступности: ${error.message}`);
            return {};
        }
        const obj = {};
        data.forEach(row => { obj[row.form_id] = row.is_available; });
        return obj;
    }

    // --- Установить доступность (только терапевт) ---
    async function setAvailability(formId, isAvailable) {
        if (!supabaseClient) return;
        const { error } = await supabaseClient
            .from('availability')
            .upsert({ form_id: formId, is_available: isAvailable }, { onConflict: 'form_id' });
        if (error) showError(`Ошибка обновления доступности: ${error.message}`);
    }

    // --- Сохранить ответ пациента ---
    async function addResponse(formId, dataObj) {
        if (!supabaseClient) return false;
        const { error } = await supabaseClient.from('responses').insert({ form_id: formId, data: dataObj });
        if (error) {
            showError(`Ошибка сохранения: ${error.message}`);
            return false;
        }
        return true;
    }

    // --- Получить все ответы (для терапевта) ---
    async function getAllResponses() {
        if (!supabaseClient) return [];
        const { data, error } = await supabaseClient
            .from('responses')
            .select('*, forms(name)')
            .order('created_at', { ascending: false });
        if (error) {
            showError(`Ошибка загрузки ответов: ${error.message}`);
            return [];
        }
        return data;
    }

    // --- Панель терапевта ---
    async function renderTherapist() {
        const app = document.getElementById('app');
        const availability = await getAvailability();
        app.innerHTML = `
            <div class="header">
                <h1>🧑‍⚕️ Режим терапевта</h1>
                <button id="logoutBtn" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <h2>📋 Управление доступом</h2>
                <div id="formsList"></div>
            </div>
            <div class="card">
                <h2>📥 Ответы пациента</h2>
                <div id="responsesViewer">Загрузка...</div>
            </div>
            <footer>Данные синхронизируются через Supabase</footer>
        `;

        // Список форм с переключателями
        const formsContainer = document.getElementById('formsList');
        for (let form of formsCache) {
            const isAvail = availability[form.id] || false;
            const div = document.createElement('div');
            div.className = 'form-item';
            div.innerHTML = `
                <div class="flex-between">
                    <div><strong>${form.name}</strong><div class="badge">${form.id}</div></div>
                    <div class="toggle-switch">
                        <span>Доступна</span>
                        <input type="checkbox" data-id="${form.id}" ${isAvail ? 'checked' : ''}>
                    </div>
                </div>
                <p style="font-size:0.8rem;">${form.description || ''}</p>
            `;
            formsContainer.appendChild(div);
            const chk = div.querySelector('input');
            chk.addEventListener('change', async (e) => {
                await setAvailability(form.id, e.target.checked);
            });
        }

        // Загрузка и отображение ответов
        async function updateResponses() {
            const responses = await getAllResponses();
            const container = document.getElementById('responsesViewer');
            if (!container) return;
            if (responses.length === 0) {
                container.innerHTML = '<p>Пока нет ответов.</p>';
                return;
            }
            let html = '';
            for (let resp of responses) {
                const formName = resp.forms?.name || resp.form_id;
                html += `<div class="submissions">
                            <strong>📄 ${formName}</strong> (${new Date(resp.created_at).toLocaleString()})<br>`;
                for (let [key, val] of Object.entries(resp.data)) {
                    if (val) html += `<span style="font-weight:500">${key}:</span> ${val}<br>`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }
        await updateResponses();

        // Подписка на изменения в реальном времени
        const responsesSub = supabaseClient.channel('responses-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'responses' }, () => updateResponses())
            .subscribe();
        const availSub = supabaseClient.channel('availability-changes')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'availability' }, () => renderTherapist())
            .subscribe();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            responsesSub.unsubscribe();
            availSub.unsubscribe();
            renderLogin();
        });
    }

    // --- Панель пациента ---
    async function renderPatient() {
        const app = document.getElementById('app');
        const availability = await getAvailability();
        const availableForms = formsCache.filter(f => availability[f.id] === true);
        app.innerHTML = `
            <div class="header">
                <h1>📝 Мои домашние задания</h1>
                <button id="logoutBtnPatient" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <div id="patientFormsContainer"></div>
            </div>
            <footer>Данные сохраняются в облаке и видны терапевту.</footer>
        `;

        const container = document.getElementById('patientFormsContainer');
        if (availableForms.length === 0) {
            container.innerHTML = '<p>⏳ Нет доступных форм. Терапевт откроет их позже.</p>';
        } else {
            for (let form of availableForms) {
                const formCard = document.createElement('div');
                formCard.className = 'form-item';
                formCard.style.marginBottom = '1.5rem';
                formCard.innerHTML = `<h3>📋 ${form.name}</h3>
                                      <p style="font-size:0.85rem;">${form.description || ''}</p>
                                      <div id="form-${form.id}" class="form-grid"></div>
                                      <div class="form-actions"><button class="save-btn" data-id="${form.id}">💾 Сохранить ответ</button></div>`;
                container.appendChild(formCard);
                const fieldsContainer = formCard.querySelector(`#form-${form.id}`);
                const fields = form.fields || [];
                fields.forEach(field => {
                    const div = document.createElement('div');
                    div.className = 'field-group';
                    div.innerHTML = `<label>${field.label}</label>
                                     <${field.type === 'textarea' ? 'textarea' : 'input'} 
                                        data-field="${field.name}" 
                                        ${field.type !== 'textarea' ? `type="${field.type}"` : ''}
                                        placeholder="${field.placeholder || ''}"></${field.type === 'textarea' ? 'textarea' : 'input'}>`;
                    fieldsContainer.appendChild(div);
                });
                const saveBtn = formCard.querySelector('.save-btn');
                saveBtn.addEventListener('click', async () => {
                    const formData = {};
                    fields.forEach(field => {
                        const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                        if (input) formData[field.name] = input.value;
                    });
                    if (Object.values(formData).every(v => !v || v.trim() === '')) {
                        alert('Заполните хотя бы одно поле.');
                        return;
                    }
                    const ok = await addResponse(form.id, formData);
                    if (ok) {
                        fields.forEach(field => {
                            const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                            if (input) input.value = '';
                        });
                        alert('✅ Ответ сохранён!');
                    }
                });
            }
        }

        const availSub = supabaseClient.channel('availability-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'availability' }, () => renderPatient())
            .subscribe();

        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            availSub.unsubscribe();
            renderLogin();
        });
    }

    // --- Экран входа (без показа паролей) ---
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center">Терапия ПРЛ+СДВГ</h1>
                <p style="text-align:center; margin-bottom:2rem;">Введите код доступа</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код</label>
                        <input type="password" id="accessCode" placeholder="••••" autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                const formsLoaded = await loadForms();
                if (formsLoaded) renderTherapist();
                else renderLogin(); // остаёмся на входе, ошибка уже показана
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                const formsLoaded = await loadForms();
                if (formsLoaded) renderPatient();
                else renderLogin();
            } else {
                alert('Неверный код');
            }
        });
    }

    // --- Запуск ---
    function start() {
        if (!initSupabase()) {
            showError("Не удалось инициализировать Supabase. Проверьте интернет и URL/ключ.");
            renderLogin();
            return;
        }
        const savedRole = sessionStorage.getItem('therapyRole');
        if (savedRole === 'therapist') {
            currentRole = 'therapist';
            loadForms().then(ok => {
                if (ok) renderTherapist();
                else renderLogin();
            });
        } else if (savedRole === 'patient') {
            currentRole = 'patient';
            loadForms().then(ok => {
                if (ok) renderPatient();
                else renderLogin();
            });
        } else {
            renderLogin();
        }
    }

    start();
</script>
</body>
</html>
