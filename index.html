<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психотерапия и рабочие листы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #eef2f9 0%, #d9e2ef 100%);
            color: #1a2c3e;
            padding: 24px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f4e7a, #3b82b6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #0f3b5c;
            border-left: 5px solid #3b82b6;
            padding-left: 1rem;
        }
        button {
            background: #3b82b6;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #1f5e8c;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3b82b6;
            color: #1f5e8c;
        }
        .btn-outline:hover {
            background: #eef4ff;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c4f6e;
        }
        input, textarea, select {
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3b82b6;
            box-shadow: 0 0 0 3px rgba(59,130,182,0.2);
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        .login-screen {
            max-width: 460px;
            margin: 12vh auto;
        }
        .error-message {
            background: #ffe6e5;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 28px;
            margin-bottom: 1rem;
        }
        .success-message {
            background: #e0f2e9;
            color: #166534;
            padding: 1rem;
            border-radius: 28px;
            margin-bottom: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #4b6f8e;
        }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ======================  КОНФИГУРАЦИЯ SUPABASE  ======================
    const SUPABASE_URL = "https://jnfhgnikpgpyeudlrdpe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuZmhnbmlrcGdweWV1ZGxyZHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDY3NjEsImV4cCI6MjA5MDUyMjc2MX0.7FsplRzp0dgYagixZnAHvH_Hl2OFZFUi5qvlU04roIg";

    let supabase = null;
    let currentRole = null;
    let formsCache = [];

    // ----------  вспомогательные функции ----------
    function showError(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'error-message';
        div.innerText = '⚠️ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 5000);
        console.error(msg);
    }

    function showSuccess(msg) {
        const app = document.getElementById('app');
        const div = document.createElement('div');
        div.className = 'success-message';
        div.innerText = '✅ ' + msg;
        app.prepend(div);
        setTimeout(() => div.remove(), 3000);
    }

    async function initSupabase() {
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            // проверяем соединение
            const { error } = await supabase.from('forms').select('count', { head: true });
            if (error) throw error;
            return true;
        } catch(e) {
            showError("Не удалось подключиться к Supabase: " + e.message);
            return false;
        }
    }

    async function loadForms() {
        const { data, error } = await supabase.from('forms').select('*');
        if (error) { showError("Ошибка загрузки форм: " + error.message); return false; }
        formsCache = data || [];
        return true;
    }

    async function getAvailability() {
        const { data, error } = await supabase.from('availability').select('*');
        if (error) return {};
        const obj = {};
        if (data) data.forEach(row => obj[row.form_id] = row.is_available);
        return obj;
    }

    async function setAvailability(formId, isAvailable) {
        await supabase.from('availability').upsert({ form_id: formId, is_available: isAvailable }, { onConflict: 'form_id' });
    }

    async function addResponse(formId, dataObj) {
        const { error } = await supabase.from('responses').insert({ form_id: formId, data: dataObj });
        if (error) { showError("Ошибка сохранения: " + error.message); return false; }
        return true;
    }

    async function getAllResponses() {
        const { data, error } = await supabase.from('responses').select('*, forms(name, fields, is_table)').order('created_at', { ascending: false });
        if (error) { showError("Ошибка загрузки ответов: " + error.message); return []; }
        return data;
    }

    async function createForm(name, description, fields, isTable) {
        const { error } = await supabase.from('forms').insert({ name, description, fields, is_table: isTable });
        if (error) { showError("Ошибка создания: " + error.message); return false; }
        return true;
    }

    async function deleteForm(formId) {
        const { error } = await supabase.from('forms').delete().eq('id', formId);
        if (error) { showError("Ошибка удаления: " + error.message); return false; }
        return true;
    }

    async function clearAllResponses() {
        if (!confirm("Удалить ВСЕ ответы пациента? Отменить нельзя.")) return;
        const { error } = await supabase.from('responses').delete().neq('id', 0);
        if (error) { showError("Ошибка очистки: " + error.message); return false; }
        showSuccess("Все ответы удалены");
        return true;
    }

    async function clearResponsesForForm(formId) {
        const form = formsCache.find(f => f.id === formId);
        if (!confirm(`Удалить все ответы по форме "${form.name}"?`)) return;
        const { error } = await supabase.from('responses').delete().eq('form_id', formId);
        if (error) { showError("Ошибка очистки: " + error.message); return false; }
        showSuccess(`Ответы по форме "${form.name}" удалены`);
        return true;
    }

    // ----------  рендер для терапевта (упрощённо, только управление доступом и просмотр) ----------
    async function renderTherapist() {
        const app = document.getElementById('app');
        const availability = await getAvailability();
        app.innerHTML = `
            <div class="header">
                <h1>🧑‍⚕️ Психотерапия и заполнение рабочих листов</h1>
                <div>
                    <button id="clearAllBtn" style="background:#d97706;">🧹 Очистить всё</button>
                    <button id="createFormBtn" style="margin-left:0.5rem;">➕ Создать форму</button>
                    <button id="logoutBtn" class="btn-outline" style="margin-left:0.5rem;">Выйти</button>
                </div>
            </div>
            <div class="card">
                <h2>📋 Управление формами</h2>
                <div id="formsList"></div>
            </div>
            <div class="card">
                <h2>📥 Все ответы</h2>
                <div id="responsesViewer">Загрузка...</div>
            </div>
            <footer>Названия форм рекомендуется начинать с номера сессии: "1 сессия — Дневник гнева"</footer>
        `;

        const formsContainer = document.getElementById('formsList');
        formsContainer.innerHTML = '';
        for (let form of formsCache) {
            const isAvail = availability[form.id] || false;
            const div = document.createElement('div');
            div.className = 'form-item';
            div.style.background = '#ffffffea';
            div.style.borderRadius = '28px';
            div.style.padding = '1rem';
            div.style.marginBottom = '1rem';
            div.style.border = '1px solid #e2edf5';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                    <div><strong>${form.name}</strong> <span style="background:#e2edf5; padding:2px 10px; border-radius:40px; font-size:0.7rem;">${form.is_table ? 'Таблица' : 'Анкета'}</span></div>
                    <div style="display:flex; gap:0.5rem;">
                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <span>Доступна</span>
                            <input type="checkbox" data-id="${form.id}" ${isAvail ? 'checked' : ''} style="width:40px; height:20px;">
                        </div>
                        <button class="clear-form" data-id="${form.id}" style="background:#d97706; padding:4px 12px;">🧹 Очистить ответы</button>
                        <button class="delete-form" data-id="${form.id}" style="background:#b91c1c; padding:4px 12px;">🗑️</button>
                    </div>
                </div>
                <p style="font-size:0.8rem; margin-top:8px;">${form.description || ''}</p>
            `;
            formsContainer.appendChild(div);
            const chk = div.querySelector('input[type="checkbox"]');
            chk.addEventListener('change', async (e) => {
                await setAvailability(form.id, e.target.checked);
            });
            const clearBtn = div.querySelector('.clear-form');
            clearBtn.addEventListener('click', async () => {
                await clearResponsesForForm(form.id);
                updateResponsesView();
            });
            const delBtn = div.querySelector('.delete-form');
            delBtn.addEventListener('click', async () => {
                if (confirm(`Удалить форму "${form.name}" и все её ответы?`)) {
                    await deleteForm(form.id);
                    await loadForms();
                    renderTherapist();
                }
            });
        }

        async function updateResponsesView() {
            const responses = await getAllResponses();
            const container = document.getElementById('responsesViewer');
            if (!container) return;
            if (responses.length === 0) {
                container.innerHTML = '<p>Нет ответов.</p>';
                return;
            }
            let html = '';
            for (let form of formsCache) {
                const formResponses = responses.filter(r => r.form_id === form.id);
                if (formResponses.length === 0) continue;
                html += `<div style="margin-bottom:2rem;"><h3>📄 ${form.name}</h3>`;
                if (form.is_table) {
                    html += '<div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse;">';
                    html += '<thead><tr><th>📅 Дата</th>';
                    (form.fields || []).forEach(f => html += `<th>${f.label}</th>`);
                    html += '</tr></thead><tbody>';
                    formResponses.forEach(resp => {
                        html += `<tr><td>${new Date(resp.created_at).toLocaleString()}</td>`;
                        (form.fields || []).forEach(f => {
                            let val = resp.data[f.name] || '';
                            html += `<td>${val}</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += '</tbody></table></div>';
                } else {
                    formResponses.forEach(resp => {
                        html += `<div style="background:#fef9e6; border-left:5px solid #eab308; margin-top:0.8rem; padding:0.9rem; border-radius:20px;">
                                    <strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                        (form.fields || []).forEach(f => {
                            let val = resp.data[f.name];
                            if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                        });
                        html += `</div>`;
                    });
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }
        await updateResponsesView();

        const responsesSub = supabase.channel('responses-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'responses' }, () => updateResponsesView())
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'responses' }, () => updateResponsesView())
            .subscribe();
        const availSub = supabase.channel('availability-changes')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'availability' }, () => renderTherapist())
            .subscribe();
        const formsSub = supabase.channel('forms-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'forms' }, async () => {
                await loadForms();
                renderTherapist();
            })
            .subscribe();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            responsesSub.unsubscribe();
            availSub.unsubscribe();
            formsSub.unsubscribe();
            renderLogin();
        });
        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            await clearAllResponses();
            updateResponsesView();
        });
        document.getElementById('createFormBtn').addEventListener('click', () => showCreateFormModal());
    }

    function showCreateFormModal() {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.4)';
        modal.style.backdropFilter = 'blur(4px)';
        modal.style.display = 'flex';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
        modal.style.zIndex = '1000';
        modal.innerHTML = `
            <div style="background:white; max-width:600px; width:90%; border-radius:40px; padding:1.5rem; max-height:80vh; overflow-y:auto;">
                <h3>➕ Создать новую форму</h3>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Название (с номером сессии)</label>
                        <input id="formName" placeholder="1 сессия — Дневник гнева">
                    </div>
                    <div class="field-group">
                        <label>Описание</label>
                        <textarea id="formDesc" rows="2"></textarea>
                    </div>
                    <div class="field-group">
                        <label>Тип формы</label>
                        <select id="formType">
                            <option value="false">📄 Анкета (отдельные записи)</option>
                            <option value="true">📊 Таблица (дневник)</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Поля</label>
                        <div id="fieldsList"></div>
                        <button type="button" id="addFieldBtn" style="background:transparent; border:1px solid #3b82b6; color:#1f5e8c;">+ Добавить поле</button>
                    </div>
                    <div class="form-actions">
                        <button id="saveFormBtn">Создать</button>
                        <button id="cancelModalBtn" class="btn-outline">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        let fields = [];

        function renderFields() {
            const container = document.getElementById('fieldsList');
            if (!container) return;
            container.innerHTML = '';
            fields.forEach((f, idx) => {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.gap = '0.5rem';
                div.style.marginBottom = '0.5rem';
                div.style.flexWrap = 'wrap';
                div.innerHTML = `
                    <input type="text" placeholder="Имя (латиница)" value="${f.name}" style="flex:2">
                    <input type="text" placeholder="Метка" value="${f.label}" style="flex:3">
                    <select style="flex:1">
                        <option value="text" ${f.type === 'text' ? 'selected' : ''}>Текст</option>
                        <option value="textarea" ${f.type === 'textarea' ? 'selected' : ''}>Многострочный</option>
                        <option value="number" ${f.type === 'number' ? 'selected' : ''}>Число</option>
                    </select>
                    <button class="remove-field" data-idx="${idx}" style="background:#b91c1c; padding:4px 10px;">✖️</button>
                `;
                container.appendChild(div);
                const nameInp = div.querySelector('input:first-child');
                const labelInp = div.querySelector('input:nth-child(2)');
                const typeSel = div.querySelector('select');
                nameInp.addEventListener('input', (e) => fields[idx].name = e.target.value);
                labelInp.addEventListener('input', (e) => fields[idx].label = e.target.value);
                typeSel.addEventListener('change', (e) => fields[idx].type = e.target.value);
                div.querySelector('.remove-field').addEventListener('click', () => {
                    fields.splice(idx, 1);
                    renderFields();
                });
            });
        }

        document.getElementById('addFieldBtn').addEventListener('click', () => {
            fields.push({ name: 'field' + (fields.length+1), label: 'Новое поле', type: 'text' });
            renderFields();
        });

        document.getElementById('saveFormBtn').addEventListener('click', async () => {
            const name = document.getElementById('formName').value.trim();
            const desc = document.getElementById('formDesc').value;
            const isTable = document.getElementById('formType').value === 'true';
            if (!name) { alert('Введите название'); return; }
            if (fields.length === 0) { alert('Добавьте хотя бы одно поле'); return; }
            const namesSet = new Set();
            for (let f of fields) {
                if (!f.name || !f.label) { alert('Заполните имя и метку поля'); return; }
                if (namesSet.has(f.name)) { alert(`Поле с именем "${f.name}" повторяется`); return; }
                namesSet.add(f.name);
            }
            const ok = await createForm(name, desc, fields, isTable);
            if (ok) {
                modal.remove();
                await loadForms();
                renderTherapist();
                showSuccess(`Форма "${name}" создана`);
            }
        });
        document.getElementById('cancelModalBtn').addEventListener('click', () => modal.remove());
        renderFields();
    }

    // ----------  панель пациента ----------
    async function renderPatient() {
        const app = document.getElementById('app');
        const availability = await getAvailability();
        const availableForms = formsCache.filter(f => availability[f.id] === true);
        app.innerHTML = `
            <div class="header">
                <h1>📝 Психотерапия и заполнение рабочих листов</h1>
                <button id="logoutBtnPatient" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <div id="patientFormsContainer"></div>
            </div>
            <footer>Данные сохраняются в облаке и видны терапевту. Формы открываются по мере прохождения сессий.</footer>
        `;
        const container = document.getElementById('patientFormsContainer');
        if (availableForms.length === 0) {
            container.innerHTML = '<p>⏳ Нет доступных форм. Терапевт откроет их позже.</p>';
            document.getElementById('logoutBtnPatient').addEventListener('click', () => {
                currentRole = null;
                sessionStorage.removeItem('therapyRole');
                renderLogin();
            });
            return;
        }

        for (let form of availableForms) {
            const formCard = document.createElement('div');
            formCard.className = 'form-item';
            formCard.style.background = '#ffffffea';
            formCard.style.borderRadius = '28px';
            formCard.style.padding = '1.2rem';
            formCard.style.marginBottom = '2rem';
            formCard.style.border = '1px solid #e2edf5';
            formCard.innerHTML = `<h3>${form.is_table ? '📊' : '📄'} ${form.name}</h3>
                                  <p style="font-size:0.85rem; margin-bottom:1rem;">${form.description || ''}</p>
                                  <div id="form-${form.id}" class="form-grid"></div>
                                  <div class="form-actions"><button class="save-btn" data-id="${form.id}">💾 Сохранить ответ</button></div>
                                  <div style="margin-top:1.5rem; font-weight:500;">📅 Мои предыдущие записи:</div>
                                  <div id="history-${form.id}"></div>`;
            container.appendChild(formCard);
            const fieldsContainer = formCard.querySelector(`#form-${form.id}`);
            const fields = form.fields || [];
            fields.forEach(field => {
                const div = document.createElement('div');
                div.className = 'field-group';
                div.innerHTML = `<label>${field.label}</label>
                                 <${field.type === 'textarea' ? 'textarea' : 'input'} 
                                    data-field="${field.name}" 
                                    ${field.type !== 'textarea' ? `type="${field.type}"` : ''}
                                    placeholder="${field.placeholder || ''}"></${field.type === 'textarea' ? 'textarea' : 'input'}>`;
                fieldsContainer.appendChild(div);
            });

            async function loadHistory(formId, historyDiv) {
                const { data, error } = await supabase.from('responses').select('*').eq('form_id', formId).order('created_at', { ascending: false });
                if (error) { historyDiv.innerHTML = '<p>Ошибка загрузки</p>'; return; }
                if (data.length === 0) { historyDiv.innerHTML = '<p>Пока нет записей.</p>'; return; }
                if (form.is_table) {
                    let html = '<div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse;">';
                    html += '<thead><tr><th>📅 Дата</th>';
                    (form.fields || []).forEach(f => html += `<th>${f.label}</th>`);
                    html += '</tr></thead><tbody>';
                    data.forEach(resp => {
                        html += `<tr><td>${new Date(resp.created_at).toLocaleString()}</td>`;
                        (form.fields || []).forEach(f => {
                            let val = resp.data[f.name] || '';
                            html += `<td>${val}</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += '</tbody></table></div>';
                    historyDiv.innerHTML = html;
                } else {
                    let html = '';
                    data.forEach(resp => {
                        html += `<div style="background:#fef9e6; border-left:5px solid #eab308; margin-top:0.5rem; padding:0.8rem; border-radius:20px;">
                                    <strong>${new Date(resp.created_at).toLocaleString()}</strong><br>`;
                        (form.fields || []).forEach(f => {
                            let val = resp.data[f.name];
                            if (val) html += `<span style="font-weight:500">${f.label}:</span> ${val}<br>`;
                        });
                        html += `</div>`;
                    });
                    historyDiv.innerHTML = html;
                }
            }

            const historyDiv = formCard.querySelector(`#history-${form.id}`);
            loadHistory(form.id, historyDiv);

            const saveBtn = formCard.querySelector('.save-btn');
            saveBtn.addEventListener('click', async () => {
                const formData = {};
                fields.forEach(field => {
                    const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                    if (input) formData[field.name] = input.value;
                });
                if (Object.values(formData).every(v => !v || v.trim() === '')) {
                    alert('Заполните хотя бы одно поле.');
                    return;
                }
                const ok = await addResponse(form.id, formData);
                if (ok) {
                    fields.forEach(field => {
                        const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                        if (input) input.value = '';
                    });
                    showSuccess('Ответ сохранён!');
                    loadHistory(form.id, historyDiv);
                }
            });

            const historySub = supabase.channel(`history-${form.id}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'responses', filter: `form_id=eq.${form.id}` }, () => loadHistory(form.id, historyDiv))
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'responses', filter: `form_id=eq.${form.id}` }, () => loadHistory(form.id, historyDiv))
                .subscribe();
            formCard.historySub = historySub;
        }

        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ----------  экран входа ----------
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center; display:block;">🧠 Психотерапия и заполнение рабочих листов</h1>
                <p style="text-align:center; margin:1rem 0 2rem;">Введите код доступа</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код</label>
                        <input type="password" id="accessCode" placeholder="••••" autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                await loadForms();
                renderTherapist();
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                await loadForms();
                renderPatient();
            } else {
                alert('Неверный код');
            }
        });
    }

    // ----------  запуск ----------
    (async () => {
        const ok = await initSupabase();
        if (!ok) {
            renderLogin(); // показываем вход, даже если supabase не работает (но ошибка уже видна)
            return;
        }
        const savedRole = sessionStorage.getItem('therapyRole');
        if (savedRole === 'therapist') {
            currentRole = 'therapist';
            await loadForms();
            renderTherapist();
        } else if (savedRole === 'patient') {
            currentRole = 'patient';
            await loadForms();
            renderPatient();
        } else {
            renderLogin();
        }
    })();
</script>
</body>
</html>
