<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терапия ПРЛ+СДВГ | Локальная версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.8rem;
            margin-bottom: 2rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #2c3e66, #4a6fa5); background-clip: text; -webkit-background-clip: text; color: transparent; }
        h2 { font-size: 1.4rem; font-weight: 500; margin-bottom: 1rem; color: #0f3b5c; border-left: 5px solid #4a6fa5; padding-left: 1rem; }
        button {
            background: #4a6fa5;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2c3e66; transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            border: 1px solid #4a6fa5;
            color: #4a6fa5;
        }
        .form-grid { display: flex; flex-direction: column; gap: 1.2rem; }
        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; font-size: 0.9rem; color: #2d3e5f; }
        input, textarea {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        textarea { min-height: 70px; resize: vertical; }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; }
        .toggle-switch { display: flex; align-items: center; gap: 0.8rem; }
        .toggle-switch input {
            width: 40px; height: 20px; appearance: none; background: #cbd5e1; border-radius: 20px;
            position: relative; cursor: pointer;
        }
        .toggle-switch input:checked { background: #4a6fa5; }
        .toggle-switch input::before {
            content: ''; width: 16px; height: 16px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 2px; transition: 0.2s;
        }
        .toggle-switch input:checked::before { left: 22px; }
        .form-list { display: flex; flex-direction: column; gap: 1rem; }
        .form-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; }
        .submissions {
            background: #fefce8;
            border-left: 5px solid #eab308;
            margin-top: 0.8rem;
            padding: 0.8rem;
            border-radius: 16px;
            font-size: 0.85rem;
        }
        .login-screen { max-width: 450px; margin: 10vh auto; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #6c7a91; }
        @media (max-width: 700px) { .card { padding: 1.2rem; } }
        .error-message { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 16px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ---------------------- БАЗА ДАННЫХ ФОРМ (локально) ----------------------
    const FORMS_DB = [
        { id: "anger_diary", name: "Дневник эпизодов гнева/импульсов (1.1)", description: "Каждый раз, когда злитесь, записывайте триггер, уверенность, действие.", fields: [
            { name: "date", label: "Дата и время", type: "text", placeholder: "31.03, 15:30" },
            { name: "trigger", label: "Что произошло? (триггер)", type: "textarea" },
            { name: "thought", label: "Что я подумал(а) в тот момент?", type: "textarea" },
            { name: "certainty", label: "Уверенность в правоте (0-100%)", type: "number" },
            { name: "action", label: "Что сделал(а)?", type: "textarea" },
            { name: "change_time", label: "Через сколько изменилось мнение?", type: "text" },
            { name: "later_insight", label: "Что понял(а) позже?", type: "textarea" }
        ] },
        { id: "emotion_chain", name: "Цепочка эмоций (2.2)", description: "Распознаём первичные эмоции под гневом.", fields: [
            { name: "trigger", label: "Триггер", type: "textarea" },
            { name: "primary_emotion", label: "Первичная эмоция (страх, стыд, боль)", type: "text" },
            { name: "secondary_anger", label: "Вторичная эмоция (гнев, ярость)", type: "text" },
            { name: "action", label: "Что я сделал(а)", type: "textarea" },
            { name: "after_feeling", label: "Что чувствовал(а) потом", type: "textarea" }
        ] },
        { id: "pause_practice", name: "Практика паузы (3.2)", description: "STOP / правило 5 минут", fields: [
            { name: "impulse", label: "Импульс (что хотел сделать)", type: "textarea" },
            { name: "used_stop", label: "Применил(а) STOP? (да/нет)", type: "text" },
            { name: "waited_min", label: "Подождал(а) минут", type: "text" },
            { name: "intensity_before", label: "Интенсивность до (0-100)", type: "number" },
            { name: "intensity_after", label: "Интенсивность после (0-100)", type: "number" },
            { name: "final_action", label: "Что в итоге сделал(а)?", type: "textarea" }
        ] }
    ];

    // Хранилище в localStorage
    let currentRole = null; // 'therapist' или 'patient'

    function initStorage() {
        if (!localStorage.getItem("formsAvailability")) {
            let availability = {};
            FORMS_DB.forEach(f => { availability[f.id] = false; });
            localStorage.setItem("formsAvailability", JSON.stringify(availability));
        }
        if (!localStorage.getItem("patientResponses")) {
            let responses = {};
            FORMS_DB.forEach(f => { responses[f.id] = []; });
            localStorage.setItem("patientResponses", JSON.stringify(responses));
        }
    }

    function getAvailability() {
        return JSON.parse(localStorage.getItem("formsAvailability"));
    }
    function setAvailability(avail) {
        localStorage.setItem("formsAvailability", JSON.stringify(avail));
    }
    function getResponses() {
        return JSON.parse(localStorage.getItem("patientResponses"));
    }
    function saveResponses(responses) {
        localStorage.setItem("patientResponses", JSON.stringify(responses));
    }
    function addResponse(formId, dataObj) {
        let responses = getResponses();
        if (!responses[formId]) responses[formId] = [];
        responses[formId].push({ timestamp: new Date().toLocaleString(), data: dataObj });
        saveResponses(responses);
    }

    // ---- Рендер терапевта ----
    function renderTherapist() {
        const app = document.getElementById('app');
        let availability = getAvailability();
        app.innerHTML = `
            <div class="header">
                <h1>🧑‍⚕️ Режим терапевта (локально)</h1>
                <button id="logoutBtn" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <h2>📋 Управление доступом к формам</h2>
                <div id="formsListTherapist" class="form-list"></div>
            </div>
            <div class="card">
                <h2>📥 Ответы пациента</h2>
                <div id="responsesViewer"></div>
            </div>
            <footer>Данные хранятся в браузере. При сбросе localStorage всё исчезнет.</footer>
        `;

        const formsContainer = document.getElementById('formsListTherapist');
        FORMS_DB.forEach(form => {
            const isAvail = availability[form.id] || false;
            const div = document.createElement('div');
            div.className = 'form-item';
            div.innerHTML = `
                <div class="flex-between">
                    <div><strong>${form.name}</strong><div class="badge">${form.id}</div></div>
                    <div class="toggle-switch">
                        <span>Доступна</span>
                        <input type="checkbox" data-id="${form.id}" ${isAvail ? 'checked' : ''}>
                    </div>
                </div>
                <p style="font-size:0.8rem;">${form.description || ''}</p>
            `;
            formsContainer.appendChild(div);
            const checkbox = div.querySelector('input');
            checkbox.addEventListener('change', (e) => {
                availability[form.id] = e.target.checked;
                setAvailability(availability);
                renderTherapist(); // перерисовка для обновления списка ответов
            });
        });

        function renderResponses() {
            const responses = getResponses();
            const container = document.getElementById('responsesViewer');
            if (!container) return;
            let hasAny = false;
            let html = '';
            for (let form of FORMS_DB) {
                let formResponses = responses[form.id] || [];
                if (formResponses.length === 0) continue;
                hasAny = true;
                html += `<div style="margin-bottom: 1.5rem;"><h3>📄 ${form.name}</h3>`;
                formResponses.forEach((resp, idx) => {
                    html += `<div class="submissions">
                                <strong>📅 ${resp.timestamp}</strong><br>`;
                    for (let field of form.fields) {
                        let val = resp.data[field.name];
                        if (val) html += `<span style="font-weight:500">${field.label}:</span> ${val}<br>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            if (!hasAny) html = '<p>Пока нет заполненных ответов.</p>';
            container.innerHTML = html;
        }
        renderResponses();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ---- Рендер пациента ----
    function renderPatient() {
        const app = document.getElementById('app');
        let availability = getAvailability();
        const availableForms = FORMS_DB.filter(f => availability[f.id] === true);
        app.innerHTML = `
            <div class="header">
                <h1>📝 Мои домашние задания</h1>
                <button id="logoutBtnPatient" class="btn-outline">Выйти</button>
            </div>
            <div class="card">
                <p style="margin-bottom:1rem;">✅ Доступные формы: ${availableForms.length} из ${FORMS_DB.length}. Терапевт открывает новые.</p>
                <div id="patientFormsContainer"></div>
            </div>
            <footer>Данные хранятся в браузере. Терапевт видит их только на этом же устройстве.</footer>
        `;
        const container = document.getElementById('patientFormsContainer');
        if (availableForms.length === 0) {
            container.innerHTML = '<p>⏳ Пока нет доступных форм. Терапевт откроет их позже.</p>';
        } else {
            availableForms.forEach(form => {
                const formCard = document.createElement('div');
                formCard.className = 'form-item';
                formCard.style.marginBottom = '1.5rem';
                formCard.innerHTML = `<h3>📋 ${form.name}</h3>
                                      <p style="font-size:0.85rem;">${form.description || ''}</p>
                                      <div id="form-${form.id}" class="form-grid"></div>
                                      <div class="form-actions"><button class="save-btn" data-id="${form.id}">💾 Сохранить ответ</button></div>`;
                container.appendChild(formCard);
                const fieldsContainer = formCard.querySelector(`#form-${form.id}`);
                form.fields.forEach(field => {
                    const div = document.createElement('div');
                    div.className = 'field-group';
                    div.innerHTML = `<label>${field.label}</label>
                                     <${field.type === 'textarea' ? 'textarea' : 'input'} 
                                        data-field="${field.name}" 
                                        ${field.type !== 'textarea' ? `type="${field.type}"` : ''}
                                        placeholder="${field.placeholder || ''}"></${field.type === 'textarea' ? 'textarea' : 'input'}>`;
                    fieldsContainer.appendChild(div);
                });
                const saveBtn = formCard.querySelector('.save-btn');
                saveBtn.addEventListener('click', () => {
                    const formData = {};
                    form.fields.forEach(field => {
                        const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                        if (input) formData[field.name] = input.value;
                    });
                    if (Object.values(formData).every(v => !v || v.trim() === '')) {
                        alert('Заполните хотя бы одно поле.');
                        return;
                    }
                    addResponse(form.id, formData);
                    // очищаем поля
                    form.fields.forEach(field => {
                        const input = fieldsContainer.querySelector(`[data-field="${field.name}"]`);
                        if (input) input.value = '';
                    });
                    alert('✅ Ответ сохранён!');
                });
            });
        }
        document.getElementById('logoutBtnPatient').addEventListener('click', () => {
            currentRole = null;
            sessionStorage.removeItem('therapyRole');
            renderLogin();
        });
    }

    // ---- Экран входа ----
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="login-screen card">
                <h1 style="text-align:center">Терапия ПРЛ+СДВГ</h1>
                <p style="text-align:center; margin-bottom:2rem;">Вход для терапевта или пациента</p>
                <div class="form-grid">
                    <div class="field-group">
                        <label>Код доступа</label>
                        <input type="password" id="accessCode" placeholder="1113 (терапевт) / 1 (пациент)">
                    </div>
                    <div class="form-actions">
                        <button id="loginBtn">Войти</button>
                    </div>
                    <p style="font-size:0.8rem; text-align:center;">Терапевт: <strong>1113</strong> &nbsp;|&nbsp; Пациент: <strong>1</strong></p>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', () => {
            const code = document.getElementById('accessCode').value.trim();
            if (code === '1113') {
                currentRole = 'therapist';
                sessionStorage.setItem('therapyRole', 'therapist');
                renderTherapist();
            } else if (code === '1') {
                currentRole = 'patient';
                sessionStorage.setItem('therapyRole', 'patient');
                renderPatient();
            } else {
                alert('Неверный код');
            }
        });
    }

    // Запуск
    initStorage();
    const savedRole = sessionStorage.getItem('therapyRole');
    if (savedRole === 'therapist') {
        currentRole = 'therapist';
        renderTherapist();
    } else if (savedRole === 'patient') {
        currentRole = 'patient';
        renderPatient();
    } else {
        renderLogin();
    }
</script>
</body>
</html>
